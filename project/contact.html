<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Vortiq Dynamics | Technology Project Enquiries</title>
    <meta name="description" content="Contact Vortiq Dynamics for IoT, cloud, embedded systems, web applications, mobile apps, websites, and edge AI project enquiries.">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#0B1F23">
    <link rel="canonical" href="https://vortiqdynamics.com/contact.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Vortiq Dynamics">
    <meta property="og:title" content="Contact Vortiq Dynamics">
    <meta property="og:description" content="Start a project enquiry for IoT, cloud, embedded, web, mobile, websites, or edge AI systems.">
    <meta property="og:url" content="https://vortiqdynamics.com/contact.html">
    <meta property="og:image" content="https://vortiqdynamics.com/assets/images/about-engineering.webp">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Contact Vortiq Dynamics">
    <meta name="twitter:description" content="Contact Vortiq Dynamics for technology project enquiries.">
    <meta name="twitter:image" content="https://vortiqdynamics.com/assets/images/about-engineering.webp">
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ContactPage",
        "name": "Contact Vortiq Dynamics",
        "url": "https://vortiqdynamics.com/contact.html",
        "mainEntity": {
          "@type": "Organization",
          "name": "Vortiq Dynamics",
          "email": "sales@vortiqdynamics.com",
          "telephone": "+91 70126 55068",
          "contactPoint": [
            {
              "@type": "ContactPoint",
              "contactType": "sales",
              "email": "sales@vortiqdynamics.com",
              "telephone": "+91 70126 55068"
            },
            {
              "@type": "ContactPoint",
              "contactType": "customer support",
              "email": "support@vortiqdynamics.com",
              "telephone": "+91 9961237829"
            }
          ]
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;700;800;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css?v=1.0.3">
  </head>
  <body data-page="contact">
    <div id="page-transition-bar" aria-hidden="true"></div>
    <div class="site-shell">
      <div data-header></div>
      <main>
        <section class="page-hero dark">
          <div class="container">
            <div class="section-kicker">Contact</div>
            <h1>Talk to Vortiq Dynamics.</h1>
            <p>Share your project idea, business challenge, or technical requirement. We will review the details and respond with the next step.</p>
          </div>
        </section>
        <section class="section">
          <div class="container form-layout">
            <aside class="info-panel reveal" data-contact-panel>
              <div class="section-kicker">Contact Details</div>
              <h2>Start with the requirement.</h2>
              <div data-contact-info></div>
            </aside>
            <form class="form-panel reveal" data-static-form>
              <div class="form-grid">
                <div class="field"><label for="contact-name">Name</label><input id="contact-name" name="name" required></div>
                <div class="field"><label for="contact-company">Company</label><input id="contact-company" name="company"></div>
                <div class="field"><label for="contact-email">Email</label><input id="contact-email" name="email" type="email" required></div>
                <div class="field"><label for="contact-phone">Phone</label><input id="contact-phone" name="phone"></div>
                <div class="field full"><label for="contact-service">Service Interested In</label><select id="contact-service" name="service"><option>IoT Solutions</option><option>Cloud Solutions</option><option>Web Applications</option><option>Mobile Applications</option><option>Websites</option><option>Embedded Systems</option><option>Edge AI</option><option>Other</option></select></div>
                <div class="field full"><label for="contact-brief">Project Brief</label><textarea id="contact-brief" name="brief" placeholder="What are you planning to build?"></textarea></div>
                <div class="field full"><label for="contact-budget">Budget Range</label><select id="contact-budget" name="budget"><option>Not sure yet</option><option>Under ₹2,500</option><option>₹2,500 - ₹5,000</option><option>₹5,000 - ₹10,000</option><option>₹10,000 - ₹25,000</option><option>₹25,000+</option></select></div>
              </div>
              <button class="btn" type="submit">Submit</button>
              <p class="form-status" data-form-status hidden></p>
            </form>
          </div>
        </section>
      </main>
      <div data-footer></div>
    </div>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js" defer></script>
    <script src="assets/js/data.js?v=1.0.3" defer></script>
    <script src="assets/js/site.js?v=1.0.3" defer></script>
  </body>
</html>
